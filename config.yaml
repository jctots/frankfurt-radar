transport:
  enabled: true
  # Optional service filter — omit or leave empty to receive all services and lines.
  # Examples:
  #   services:             ← all services, all lines (default)
  #   services:
  #     ubahn:              ← all U-Bahn lines, nothing else
  #     sbahn:
  #       - S3
  #       - S4             ← only S3 and S4
  services:

polling:
  interval_minutes: 10   # min 10, max 60 — drives cron poll schedule

translator:
  backend: libretranslate          # libretranslate | google
  # libretranslate_url: http://libretranslate:5000   # set if using libretranslate backend

notifier:
  backend: telegram                # ntfy | telegram
  # ntfy_url: http://ntfy:80
  # ntfy_topic: frankfurt-radar
  telegram_channel: "@FrankfurtRadar"   # Telegram channel username or numeric chat ID
  status_url: https://frankfurt-radar.com   # status page URL used in daily briefing "Details" link
  notify_burst_threshold: 10      # if new alerts >= this in one run, skip notifications (cold-start guard)
  notify_throttle_every: 10       # pause 3s after every N notifications (0 = disabled)

police:
  enabled: true
  max_age_hours: 48                # drop police alerts older than this many hours; 0 = no limit

web:
  allow_manual_poll: false   # set to true only for private/self-hosted deployments
  # Optional — omit or leave blank to hide from the "More info" modal
  telegram_channel_url: https://t.me/FrankfurtRadar
  kofi_url: https://ko-fi.com/jctots
  github_url: https://github.com/jctots/frankfurt-radar
  privacy_url: /privacy
  privacy_controller: Rosanno JC De Dios
  privacy_contact: jctots@pm.me
  security_url: /security
  security_contact: jctots@pm.me

# Phase 2b — weather warnings (DWD)
weather:
  enabled: true
  min_severity: 1         # 1=minor, 2=moderate, 3=severe, 4=extreme

# Phase 2a v0.2.0 — Autobahn road incidents (no API key required)
autobahn:
  enabled: true
  radius_km: 50          # only include incidents within this distance of Frankfurt centre
  roads:
    - A3
    - A5
    - A45
    - A66
    - A661
    - A648

# Phase 2a v0.2.0 — Ticketmaster events (requires TICKETMASTER_API_KEY in .env)
events:
  enabled: true
  days_ahead: 7           # query events starting now through this many days ahead
