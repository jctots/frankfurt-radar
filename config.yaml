cost:
  monthly_budget: 5.00          # EUR — /cost alert thresholds at 50%, 80%, 100%
  usd_to_eur: 0.92
  gemini:
    input_per_million: 0.15     # USD per 1M input tokens (Gemini 2.5 Flash)
    output_per_million: 0.60    # USD per 1M output tokens
    thinking_per_million: 3.50  # USD per 1M thinking tokens
  google_translate:
    chars_per_million: 20.00    # USD per 1M characters

stale_after_days: 30        # alerts whose valid_from is older than this move to "Long-running Disruptions"
cleared_retention_days: 7   # how many days to keep cleared alerts visible in the Cleared section

transport:
  enabled: true
  # Optional service filter — omit or leave empty to receive all services and lines.
  # Examples:
  #   services:             ← all services, all lines (default)
  #   services:
  #     ubahn:              ← all U-Bahn lines, nothing else
  #     sbahn:
  #       - S3
  #       - S4             ← only S3 and S4
  services:

pulse:
  enabled: false           # opt-in; set true in production config
  max_prompt_alerts: 60    # keep this many alerts individually detailed in the pulse prompt,
                           # ranked by severity weight (pulse_categories._compute_weight);
                           # the rest are folded into a capped_summary line

polling:
  interval_minutes: 10   # min 1, max 60 — drives cron poll schedule

location:
  radius_km: 50          # shared radius (km) for all location-aware pollers (autobahn, events)

translator:
  backend: libretranslate          # libretranslate | google
  libretranslate_url: http://libretranslate:5000   # set if using libretranslate backend
  max_chars: 1500                  # hard cap per translate() call — cost circuit-breaker against
                                    # unusually long alert text, not a routine UX truncation

admin_health_notifier:
  backend: telegram                # ntfy | telegram
  # ntfy_url: http://ntfy:80
  # ntfy_topic: frankfurt-radar-health
  telegram_chat_id: "123456789"    # your personal numeric chat ID (msg the bot, then GET /bot<TOKEN>/getUpdates)
  poll_stale_minutes: 20           # alert if last poll is older than this; 0 = disabled
  ram_warn_pct: 85                 # alert if RAM usage exceeds this percentage

notifier:
  backend: telegram                # ntfy | telegram
  # ntfy_url: http://ntfy:80
  # ntfy_topic: frankfurt-radar
  telegram_channel: "@FrankfurtRadar"   # Telegram channel username or numeric chat ID
  status_url: https://frankfurt-radar.com   # status page URL used in daily briefing "Details" link
  notify_burst_threshold: 10      # if new alerts >= this in one run, skip notifications (cold-start guard)
  notify_throttle_every: 10       # pause 3s after every N notifications (0 = disabled)
  # disabled_sources:             # sources never sent to Telegram/ntfy (still polled + shown on website)
  #   - polizei                   # valid: rmv, dwd, polizei, autobahn, baustellen, feuerwehr, events, sports

police:
  enabled: true
  max_age_hours: 48                # drop police alerts older than this many hours; 0 = no limit

weather:
  enabled: true
  min_severity: 1         # 1=minor, 2=moderate, 3=severe, 4=extreme

# Highway road incidents — Autobahn GmbH API (no key required)
autobahn:
  enabled: true
  kinds:
    - closure       # planned roadworks and closures (days/weeks)
    # - warning     # real-time incidents (jams, accidents) — noisy during rush hour
  roads:
    - A3
    - A5
    - A45
    - A60
    - A66
    - A67
    - A480
    - A648
    - A661

# Frankfurt city road disruptions — geowebdienste.frankfurt.de WFS (public, no auth)
baustellen:
  enabled: true
  closures:
    - full                  # sperrung=1: road completely blocked
    # - partial               # sperrung=0: lane restriction / partial closure

# Fire department alerts — Feuerwehr Frankfurt Bluesky feed (@feuerwehrffm.bsky.social)
feuerwehr:
  enabled: true
  ttl_hours: 4          # keep fire alerts active for this many hours after first post

# Strike alerts — ver.di Hessen + hessenschau RSS, LLM-extracted dates/locations
strike:
  enabled: true
  max_age_days: 14          # backstop: drop alerts older than this IF valid_until is missing

# City events — dates and details are in city_events.yaml (same DATA_DIR)
events:
  enabled: true
  advance_days: 7         # show each event this many days before it starts

# Trade fairs — dates and details are in messe_events.yaml (same DATA_DIR)
messe:
  enabled: true
  advance_days: 7        # show trade fairs this many days before they start

# Sports events — static dates in sports_events.yaml (same DATA_DIR)
sports:
  enabled: true
  advance_days: 7         # show each event this many days before it starts
