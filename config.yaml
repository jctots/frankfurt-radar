transport:
  enabled: true
  # Optional service filter — omit or leave empty to receive all services and lines.
  # Examples:
  #   services:             ← all services, all lines (default)
  #   services:
  #     ubahn:              ← all U-Bahn lines, nothing else
  #     sbahn:
  #       - S3
  #       - S4             ← only S3 and S4
  services:

polling:
  interval_minutes: 10   # min 10, max 60 — drives cron poll schedule
  daily_hour: 6          # 0–23 — daily briefing fires at HH:45
  quiet_hours:           # polls suppressed outside this window (local time, TZ=Europe/Berlin)
    start: 23
    end: 7

translator:
  backend: google                  # libretranslate | google
  # libretranslate_url: http://libretranslate:5000   # set if using libretranslate backend

notifier:
  backend: telegram                # ntfy | telegram
  # ntfy_url: http://ntfy:80
  # ntfy_topic: frankfurt-radar
  telegram_channel: "@FrankfurtRadar"   # Telegram channel username or numeric chat ID
  status_url: https://frankfurt-radar.com   # status page URL used in daily briefing "Details" link
  notify_burst_threshold: 10      # if new alerts >= this in one run, skip notifications (cold-start guard)
  notify_throttle_every: 10       # pause 3s after every N notifications (0 = disabled)

police:
  enabled: true
  translate_body: false            # false = title + link only (§87g(2) safe harbour); applies to notifications and web page

web:
  allow_manual_poll: false   # set to true only for private/self-hosted deployments

# Phase 2b — weather warnings (DWD)
weather:
  enabled: true
  min_severity: 1         # 1=minor, 2=moderate, 3=severe, 4=extreme
