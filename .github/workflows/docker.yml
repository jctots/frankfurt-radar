name: Publish

on:
  push:
    branches:
      - main
      - staging
      - 'feature/**'
      - 'feat/**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata — poller
        id: meta-poller
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jctots/frankfurt-radar-poller
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Metadata — notifier
        id: meta-notifier
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jctots/frankfurt-radar-notifier
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Metadata — web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jctots/frankfurt-radar-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Get version
        id: version
        run: echo "value=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Build and push poller
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-poller.outputs.tags }}
          labels: ${{ steps.meta-poller.outputs.labels }}

      - name: Build and push notifier
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notifier/Dockerfile
          push: true
          tags: ${{ steps.meta-notifier.outputs.tags }}
          labels: ${{ steps.meta-notifier.outputs.labels }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: BUILD_VERSION=${{ steps.version.outputs.value }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        package:
          - frankfurt-radar-poller
          - frankfurt-radar-notifier
          - frankfurt-radar-web
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
