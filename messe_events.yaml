# Messe Frankfurt trade fairs — update dates each year
#
# Source: https://www.messefrankfurt.com and https://www.neventum.com/tradeshows/frankfurt
#
# Only major events with significant city impact (crowd size, transit load, hotel occupancy).
# Small niche fairs (< 10k visitors) are excluded unless they cause notable disruption.
#
# Fields:
#   name    : display name (required)
#   start   : YYYY-MM-DD — Frankfurt local time (Europe/Berlin) (required)
#   end     : YYYY-MM-DD — Frankfurt local time (Europe/Berlin) (required)
#   location: venue (optional)
#   lat/lon : Messe Frankfurt main entrance coordinates (optional)
#   details : transit and crowd impact (optional)
#   url     : official event page (optional)

- name: "Eurobike"
  start: "2026-06-24"
  end: "2026-06-27"
  location: "Messe Frankfurt"
  lat: 50.1121
  lon: 8.6454
  details: "Europe's largest cycling trade fair. S-Bahn S3/S4/S5/S6 (Messe station) and U4 (Festhalle/Messe) heavily loaded; parking garages around Ludwig-Erhard-Anlage fill early."
  url: "https://www.eurobike.com"

