services:
  poller:
    image: ghcr.io/jctots/frankfurt-radar-poller:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-poller
    init: true
    environment:
      - TZ=Europe/Berlin
      - RMV_API_KEY=${RMV_API_KEY}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
    volumes:
      - radar_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  mcp:
    image: ghcr.io/jctots/frankfurt-radar-mcp:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-mcp
    init: true
    environment:
      - TZ=Europe/Berlin
    volumes:
      - radar_data:/app/data
    ports:
      - "${MCP_PORT:-8811}:8811"
    depends_on:
      - poller
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  radar_data:
