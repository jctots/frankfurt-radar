services:
  poller:
    image: ghcr.io/jctots/frankfurt-radar-poller:${RADAR_TAG:-latest}
    environment:
      - TZ=Europe/Berlin
    volumes:
      - ./.env:/app/.env:ro
      - ./config.yaml:/app/config.yaml:ro
      - radar_data:/app/data
    depends_on:
      - ntfy
    restart: unless-stopped

  web:
    image: ghcr.io/jctots/frankfurt-radar-web:${RADAR_TAG:-latest}
    environment:
      - TZ=Europe/Berlin
    volumes:
      - ./.env:/app/.env:ro
      - ./config.yaml:/app/config.yaml:ro
      - radar_data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy:latest
    ports:
      - "80:80"
    volumes:
      - ntfy_data:/var/lib/ntfy
    restart: unless-stopped

volumes:
  radar_data:   # shared SQLite DB (radar.db) between poller and web containers
  ntfy_data:
