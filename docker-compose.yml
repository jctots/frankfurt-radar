services:
  poller:
    image: ghcr.io/jctots/frankfurt-radar-poller:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-poller
    environment:
      - TZ=Europe/Berlin
      - RMV_API_KEY=${RMV_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY:-}
    volumes:
      - radar_data:/app/data
    depends_on:
      - ntfy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  web:
    image: ghcr.io/jctots/frankfurt-radar-web:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-web
    environment:
      - TZ=Europe/Berlin
      - POLLER_TRIGGER_URL=http://poller:8888/poll
    volumes:
      - radar_data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  ntfy:
    image: binwiederhier/ntfy:latest
    ports:
      - "80:80"
    volumes:
      - ntfy_data:/var/lib/ntfy
    restart: unless-stopped

volumes:
  radar_data:   # shared SQLite DB (radar.db) between poller and web containers
  ntfy_data:
