services:
  poller:
    image: ghcr.io/jctots/frankfurt-radar-poller:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-poller
    init: true
    environment:
      - TZ=Europe/Berlin
      - RMV_API_KEY=${RMV_API_KEY}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      - NOTIFIER_DISPATCH_URL=http://notifier:8443/dispatch
    volumes:
      - radar_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  notifier:
    image: ghcr.io/jctots/frankfurt-radar-notifier:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-notifier
    init: true
    environment:
      - TZ=Europe/Berlin
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - POLLER_TRIGGER_URL=http://poller:8888/poll
      - UMAMI_INTERNAL_URL=http://umami:3000
      - UMAMI_USERNAME=${UMAMI_USERNAME:-}
      - UMAMI_PASSWORD=${UMAMI_PASSWORD:-}
      - WEBHOOK_PORT=8443
    volumes:
      - radar_data:/app/data
    depends_on:
      - poller
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  web:
    image: ghcr.io/jctots/frankfurt-radar-web:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-web
    init: true
    environment:
      - TZ=Europe/Berlin
      - POLLER_TRIGGER_URL=http://poller:8888/poll
      - STADIA_API_KEY=${STADIA_API_KEY:-}
    volumes:
      - radar_data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  ntfy:
    image: binwiederhier/ntfy:latest
    profiles: [staging]
    init: true
    ports:
      - "80:80"
    volumes:
      - ntfy_data:/var/lib/ntfy
    restart: unless-stopped

  mcp:
    image: ghcr.io/jctots/frankfurt-radar-mcp:${RADAR_TAG:-latest}
    container_name: frankfurt-radar-mcp
    init: true
    environment:
      - TZ=Europe/Berlin
      - MCP_ADMIN_KEY=${MCP_ADMIN_KEY:-}
      - MCP_API_KEYS=${MCP_API_KEYS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - UMAMI_INTERNAL_URL=http://umami:3000
    volumes:
      - radar_data:/app/data
    ports:
      - "${MCP_PORT:-8811}:8811"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: [production]
    container_name: umami
    init: true
    ports:
      - "8880:3000"
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD:-unused}@umami-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET:-unused}
      - DISABLE_BOT_CHECK=1
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  umami-db:
    image: postgres:15-alpine
    profiles: [production]
    container_name: umami-db
    init: true
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD:-unused}
    volumes:
      - umami_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  caddy:
    image: caddy:2-alpine
    profiles: [production]
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - web
      - notifier
      - mcp
      - umami
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  radar_data:   # shared SQLite DB (radar.db) between poller, notifier, and web containers
  ntfy_data:
  umami_data:
  caddy_data:
