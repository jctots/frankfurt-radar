# ── Triathlon / IRONMAN ───────────────────────────────────────────────────────

- name: "IRONMAN European Championship Frankfurt"
  sport: triathlon
  start: "2026-06-28"
  end: "2026-06-28"
  location: "Römerberg (finish) / Langener Waldsee (swim)"
  lat: 50.1103
  lon: 8.6821
  details: "Full-distance IRONMAN — swim at Langener Waldsee, 180 km bike through Taunus foothills (Bad Vilbel, Schmitten, Oberursel), marathon along the Main river with finish at Römerberg. Major road closures all day across northern Frankfurt, Taunus villages, and the city centre; virtually all cross-city bus routes are disrupted. Use S-Bahn and U-Bahn."
