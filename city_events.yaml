# Frankfurt city events — update dates each year
#
# Source for dates and new events: https://www.visitfrankfurt.travel/erleben/veranstaltungskalender
# Official city festival list: https://frankfurt.de/frankfurt-entdecken-und-erleben/stadtportrait/frankfurter-feste
#
# Fields:
#   name    : display name (required)
#   start   : YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS — Frankfurt local time (Europe/Berlin) (required)
#   end     : YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS — Frankfurt local time (Europe/Berlin) (required)
#   location: venue or area shown in the alert (optional)
#   lat/lon : map pin coordinates for the venue (optional)
#   details : one or two sentences shown in the detail popup (optional)
#   url     : link shown in the detail popup — use the official event page (optional)
#   image   : direct upload.wikimedia.org URL for popup photo (optional, CC-licensed)

